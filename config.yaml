      # Balancer V2
      - name: BalancerVault
        start_block: ${ENVIO_POLYGON_START_BLOCK:-15832990}
        address: "0xba12222222228d8ba445958a75a0704d566bf2c8"

      # DODO V2
      - name: DodoFactory
        start_block: ${ENVIO_POLYGON_START_BLOCK:-14722979}
        address:
          - "0x79887f65f83bdf15bcc8736b5e5bcdb48fb8fe13" # DVM
          - "0xd24153244066f0afa9415563bfc7ba248bfb7a51" # DPP
          - "0x43c49f8dd240e1545f147211ec9f917376ac1e87" # DSP

      # WOOFi
      - name: WooPPV2
