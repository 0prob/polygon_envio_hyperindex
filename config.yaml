# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: arb_bot_ingestion
description: "High-performance DEX indexing for arbitrage opportunities (Polygon-optimized)"
ecosystem: evm

# Address format: lowercase makes all surfaced addresses (event.srcAddress, transaction.from/to,
# entity ids, dynamically registered contract addresses, etc.) consistently lowercase.
# This greatly reduces the need for manual .toLowerCase() calls in handlers.
# See https://docs.envio.dev/docs/HyperIndex/configuration-file#address-format
address_format: lowercase

# Keep reorg support enabled in production for safety.
# HyperIndex handles rollbacks automatically when enabled.
rollback_on_reorg: true
raw_events: false

# === HYPERINDEX CONFIG ===
# Run with `bun run dev` (bridges root .env aliases + batch sizing) or bare `envio dev` if ENVIO_* vars are set.
#
# This indexer serves as a lightweight live discovery feed for the arb bot:
#   → fast startup
#   → minimal historical backfill
#
# Historical backfill processes 50M+ events from 2021.
# Discovery uses factory/registry onEvent handlers only.
# Guards (shouldSkipFactoryPool) + onBlock `where` strides reject garbage early.

# Polygon batch sizing. This is one of the most important knobs for backfill throughput.
full_batch_size: ${ENVIO_FULL_BATCH_SIZE:-6000}

# HyperSync is the recommended high-performance data source (2000x faster than RPC).
# Token is passed via ENVIO_API_TOKEN (required for production use per 2026 docs).
#
# Effects (token metadata, Balancer/Curve/DODO reads) use a centralized batched RPC client with fallback.
# The host process probes + filters for archival support and prefers endpoints from POLYGON_RPC_URLS
# (set in root .env) before falling back to free public RPCs (after removing any that fail historical calls).
# Set POLYGON_RPC_URLS (comma-separated) in your .env for custom/paid providers with archive.

# === Global Contract Definitions (recommended V3 pattern) ===
# Contracts are defined once here (name + ABI + events).
# Per-chain entries only supply addresses + start_block overrides.
# This follows https://docs.envio.dev/docs/HyperIndex/configuration-file#contracts-definition
contracts:
  # V2 Factories
  - name: V2Factory
    abi_file_path: abis/uniswap_v2_factory.json
    events:
      - event: PairCreated

  # V3 Factories (Uniswap V3 / Sushi V3 — PoolCreated)
  - name: V3Factory
    abi_file_path: abis/uniswap_v3_factory.json
    events:
      - event: PoolCreated

  # Algebra factories (QuickSwap V3 on Polygon — Pool, not PoolCreated).
  # V4 Algebra (0x134c1d...) adds plugin/hooks support, same `Pool` event.
  - name: AlgebraFactory
    abi_file_path: abis/algebra_factory.json
    events:
      - event: Pool

  # Curve NG factories — emit pool-deployment events with pool address.
  # MetaRegistry (0x296d2b5c...) supports pool_list/pool_count/get_coins/get_n_coins
  # but does NOT emit PoolAdded. Bootstrap uses the MetaRegistry directly.
  # Stableswap NG (PlainPoolDeployed/MetaPoolDeployed) events lack pool address
  # so stableswap pools rely on the 250-block bootstrap stride.
  - name: CurveTwocryptoFactory
    abi_file_path: abis/curve_twocrypto_factory.json
    events:
      - event: TwocryptoPoolDeployed
  - name: CurveTricryptoFactory
    abi_file_path: abis/curve_tricrypto_factory.json
    events:
      - event: TricryptoPoolDeployed

  # Uniswap V4
  - name: PoolManager
    abi_file_path: abis/uniswap_v4_pool_manager.json
    events:
      - event: Initialize

  # Balancer V2
  - name: BalancerVault
    abi_file_path: abis/balancer_vault.json
    events:
      - event: PoolRegistered
      - event: TokensRegistered

  # DODO V2
  - name: DodoFactory
    abi_file_path: abis/dodo_factory.json
    events:
      - event: NewDVM
      - event: NewDPP
      - event: NewDSP

  # WOOFi
  - name: WooPPV2
    abi_file_path: abis/woofi_pool.json
    events:
      - event: WooSwap

# === Chains ===
chains:
  - id: 137
    # Chain start_block must be <= every contract start_block (Envio rejects contract < chain).
    # Default = earliest indexed deployment (QuickSwap V2 factory, block 4931780).
    # Override ENVIO_POLYGON_START_BLOCK in .env for live-tail / partial re-sync.
    start_block: ${ENVIO_POLYGON_START_BLOCK:-4931780}
    # Max reorg depth for Polygon. Docs recommend 150 for Polygon, 250 for Ethereum.
    # We use 200 (the global default) which is conservative but safe.
    # HyperIndex rolls back all entity state automatically when a reorg is detected.
    # Side effects in handler code (external calls, logs) are NOT rolled back.
    max_reorg_depth: 150
    hypersync_config:
      url: ${ENVIO_POLYGON_HYPERSYNC_URL:-https://polygon.hypersync.xyz}
      # api_token can also be set here, but ENVIO_API_TOKEN env var is the standard approach.
    contracts:
      # V2 Factories — one entry per contract name; address list (Envio overwrites duplicate names).
      # Inherits chain start_block (QuickSwap deploy); later factories have no events until deploy.
      - name: V2Factory
        address:
          - "0x5757371414417b8c6caad45baef941abc7d3ab32" # Quickswap
          - "0xc35dadb65012ec5796536bd9864ed8773abc74c4" # Sushi
          - "0x9e5a52f57b3038f1b8eee45f28b3c1967e22799c" # Uniswap
          - "0xe7fb3e833efe5f9c441105eb65ef8b261266423b" # Dfyn
          - "0xcf083be4164828f00cae704ec15a36d711491284" # Apeswap
          - "0x9f3044f7f9fc8bc9ed615d54845b4577b833282d" # Meshswap
          - "0x668ad0ed2622c62e24f0d5ab6b6ac1b9d2cd4ac7" # Jetswap
          - "0x800b052609c355ca8103e06f022aa30647ead60a" # Cometh

      # V3 Factories — one entry per contract name; address list (Uniswap-style PoolCreated).
      # start_block = earliest deployment (Uniswap V3 on Polygon).
      - name: V3Factory
        start_block: ${ENVIO_POLYGON_START_BLOCK:-22757547}
        address:
          - "0x1f98431c8ad98523631ae4a59f267346ea31f984" # Uniswap
          - "0x917933899c6a5f8e37f31e19f92cdbff7e8ff0e2" # Sushi
          - "0x2bef16a0081565e72100d73cbe19b1bd2d802380" # Ramses V3 CL

      # Algebra (QuickSwap V3 + V4)
      - name: AlgebraFactory
        start_block: ${ENVIO_POLYGON_START_BLOCK:-34502463}
        address:
          - "0x411b0facc3489691f28ad58c47006af5e3ab3a28" # QuickSwap V3 Algebra
          - "0x134c1dbe4860a9caaf89002574ffe814772d9904" # QuickSwap V4 Algebra

      # Curve NG factories — immediate pool discovery for twocrypto/tricrypto.
      # Stableswap pools rely on the MetaRegistry bootstrap (every 250 blocks).
      - name: CurveTwocryptoFactory
        start_block: ${ENVIO_POLYGON_START_BLOCK:-58597033}
        address: "0x98EE851a00abeE0d95D08cF4CA2BdCE32aeaAF7F"
      - name: CurveTricryptoFactory
        start_block: ${ENVIO_POLYGON_START_BLOCK:-58597033}
        address: "0xC1b393EfEF38140662b91441C6710Aa704973228"

      # Uniswap V4
      - name: PoolManager
        start_block: ${ENVIO_POLYGON_START_BLOCK:-67082470}
        address: "0x67366782805870060151383f4bbff9dab53e5cd6"

      # Balancer V2
      - name: BalancerVault
        start_block: ${ENVIO_POLYGON_START_BLOCK:-15832990}
        address: "0xba12222222228d8ba445958a75a0704d566bf2c8"

      # DODO V2
      - name: DodoFactory
        start_block: ${ENVIO_POLYGON_START_BLOCK:-14722979}
        address:
          - "0x79887f65f83bdf15bcc8736b5e5bcdb48fb8fe13" # DVM
          - "0xd24153244066f0afa9415563bfc7ba248bfb7a51" # DPP
          - "0x43c49f8dd240e1545f147211ec9f917376ac1e87" # DSP

      # WOOFi
      - name: WooPPV2
        start_block: ${ENVIO_POLYGON_START_BLOCK:-30000000}
        address: "0x5520385bfcf07ec87c4c53a7d8d65595dff69fa4"
